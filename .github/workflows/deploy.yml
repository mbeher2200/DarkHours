name: deploy (Lambda + CloudFront)

# Keyless deploy via GitHub OIDC (no stored AWS keys). Fires only on push to main.
# Flow: test gate -> assume OIDC deploy role -> build SPA -> cdk deploy PyNightSkyLambda.
# Both the API and worker are zip Lambdas: CDK asset bundling pip-installs their deps
# on linux/amd64 during `cdk deploy` — no Docker build or ECR push needed in CI.

on:
  push:
    branches: ["main"]

# OIDC needs id-token: write; checkout needs contents: read.
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: false      # never interrupt an in-flight deploy

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      # --- test gate: never deploy a red build (aws + raster tests auto-skip in CI) ---
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Tests (pytest)
        run: python -m pytest -q

      # --- assume the deploy role via OIDC (short-lived creds, no stored keys) ---
      - name: Configure AWS credentials (OIDC)
        id: aws
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # --- deploy the stack (CDK asset bundling builds both zip Lambdas inline) ---
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install CDK + stack deps
        run: |
          npm install -g aws-cdk@2
          pip install -r cdk/requirements.txt
      # Build the SPA: the stack stages apps/web/dist as a CloudFront/S3 asset, so it
      # must exist before `cdk deploy` synthesizes.
      - name: Build SPA
        working-directory: apps/web
        run: |
          npm ci
          npm run build
      - name: cdk deploy PyNightSkyLambda
        working-directory: cdk
        env:
          CDK_DEFAULT_ACCOUNT: ${{ steps.aws.outputs.aws-account-id }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}
          PYNIGHTSKY_RASTER_BUCKET: ${{ secrets.PYNIGHTSKY_RASTER_BUCKET }}
          PYNIGHTSKY_CACHE_TABLE: ${{ secrets.PYNIGHTSKY_CACHE_TABLE }}
        run: cdk deploy PyNightSkyLambda --require-approval never
